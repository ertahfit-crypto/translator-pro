<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Translator Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        * {
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: #f5f5f5;
            background-image: radial-gradient(circle, #e0e0e0 1px, transparent 1px);
            background-size: 20px 20px;
        }

        .card-shadow {
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        .purple-circle {
            background-color: #8b5cf6;
        }

        .language-dropdown {
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%236b7280' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e");
            background-position: right 0.5rem center;
            background-repeat: no-repeat;
            background-size: 1.5em 1.5em;
            padding-right: 2.5rem;
        }

        .history-item {
            transition: all 0.2s ease;
        }

        .history-item:hover {
            background-color: #f9fafb;
        }

            </style>
</head>
<body class="min-h-screen">
    <!-- Header -->
    <header class="bg-white border-b border-gray-200 px-6 py-4">
        <div class="flex items-center justify-between max-w-7xl mx-auto">
            <!-- Left side - Title with icon -->
            <div class="flex items-center gap-3">
                <div class="purple-circle w-10 h-10 rounded-full flex items-center justify-center">
                    <span class="text-white font-bold text-lg">T</span>
                </div>
                <h1 class="text-2xl font-semibold text-gray-900">Translator Pro</h1>
            </div>

            <!-- Right side - Control icons -->
            <div class="flex items-center gap-4">
                <button class="hidden md:block p-2 hover:bg-gray-100 rounded-lg transition-colors">
                    <i data-lucide="monitor" class="w-5 h-5 text-gray-600"></i>
                </button>
                <button id="settingsBtn" class="p-2 hover:bg-gray-100 rounded-lg transition-colors">
                    <i data-lucide="settings" class="w-5 h-5 text-gray-600"></i>
                </button>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-6 py-6">
        <!-- Language Selection with Swap Button -->
        <div class="flex flex-col md:flex-row items-center justify-center gap-2 mb-6">
            <!-- From Language -->
            <select id="sourceLanguage" class="w-full max-w-[280px] sm:min-w-[160px] px-3 sm:px-4 py-2 sm:py-3 pr-10 border border-gray-200 rounded-xl text-gray-900 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent language-dropdown bg-transparent appearance-none shadow-sm">
                <!-- Languages will be populated by JavaScript -->
            </select>

            <!-- Language Swap Button -->
            <button id="swapBtn" class="bg-blue-600 hover:bg-blue-700 text-white w-8 h-8 sm:w-10 sm:h-10 rounded-md flex items-center justify-center transition-all hover:scale-110 card-shadow rotate-90 md:rotate-0">
                &#x21C4;
            </button>

            <!-- To Language -->
            <select id="targetLanguage" class="w-full max-w-[280px] sm:min-w-[150px] px-3 sm:px-4 py-2 sm:py-3 pr-10 border border-gray-200 rounded-xl text-gray-900 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent language-dropdown bg-transparent appearance-none shadow-sm">
                <!-- Languages will be populated by JavaScript -->
            </select>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <!-- Left Column - Input -->
            <div class="bg-white rounded-xl border border-gray-200 card-shadow">
                <!-- Input Text Area -->
                <div class="p-4">
                    <label for="inputText" class="text-sm text-gray-600 font-medium sr-only">Input Text</label>
                    <textarea id="inputText" rows="8" maxlength="800"
                              class="w-full px-3 py-2 border border-gray-300 rounded-lg text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent resize-none"
                              placeholder="Введите текст..."></textarea>

                    <!-- Character Counter -->
                    <div class="flex justify-center sm:justify-between items-center mt-2 text-sm text-gray-500 transition-colors duration-300">
                        <span id="charCounter">Characters: 0 (0%)</span>
                    </div>
                </div>

                <!-- Input Controls -->
                <div class="flex items-center justify-between p-4 border-t border-gray-200">
                    <div class="flex items-center gap-3 sm:gap-2">
                        <button id="copyInputBtn" class="p-3 sm:p-2 hover:bg-gray-100 rounded-lg transition-colors" title="Copy">
                            <i data-lucide="copy" class="w-4 h-4 text-gray-600"></i>
                        </button>
                        <button id="speakInputBtn" class="p-3 sm:p-2 hover:bg-gray-100 rounded-lg transition-colors" title="Speak">
                            <i data-lucide="volume-2" class="w-4 h-4 text-gray-600"></i>
                        </button>
                        <button id="micBtn" class="p-3 sm:p-2 hover:bg-gray-100 rounded-lg transition-colors" title="Voice Input">
                            <i data-lucide="mic" class="w-4 h-4 text-gray-600"></i>
                        </button>
                    </div>

                    <!-- Translate Button -->
                    <button id="translateBtn" class="bg-blue-600 hover:bg-blue-700 text-white px-3 py-1.5 rounded-lg transition-colors font-medium text-sm">
                        Translate
                    </button>
                </div>
            </div>

            <!-- Right Column - Output -->
            <div class="bg-white rounded-xl border border-gray-200 card-shadow">
                <!-- Output Text Area -->
                <div class="p-4">
                    <label for="outputText" class="text-sm text-gray-600 font-medium sr-only">Output Text</label>
                    <div id="outputText" class="w-full min-h-[200px] px-3 py-2 border border-gray-300 rounded-lg text-gray-900 bg-gray-50 resize-none overflow-auto">
                    </div>
                </div>

                <!-- Output Controls -->
                <div class="flex items-center justify-between p-4 border-t border-gray-200">
                    <div class="flex items-center gap-3 sm:gap-2">
                        <button id="copyOutputBtn" class="p-3 sm:p-2 hover:bg-gray-100 rounded-lg transition-colors" title="Copy">
                            <i data-lucide="copy" class="w-4 h-4 text-gray-600"></i>
                        </button>
                        <button id="speakOutputBtn" class="p-3 sm:p-2 hover:bg-gray-100 rounded-lg transition-colors" title="Speak">
                            <i data-lucide="volume-2" class="w-4 h-4 text-gray-600"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Recent History Section -->
        <div class="mt-8 bg-white rounded-xl border border-gray-200 card-shadow w-full max-w-6xl mx-auto">
            <div id="historyHeader" class="flex items-center justify-between p-4 border-b border-gray-200 cursor-pointer hover:bg-gray-50 transition-colors">
                <div class="flex items-center gap-2">
                    <i id="historyChevron" data-lucide="chevron-down" class="w-5 h-5 text-gray-600 transition-transform duration-200"></i>
                    <h2 class="text-lg font-semibold text-gray-900">Recent History</h2>
                    <button id="favoriteFilterBtn" class="p-2 hover:bg-gray-100 rounded-lg transition-colors" title="Show Favorites Only">
                        <i data-lucide="star" class="w-4 h-4 text-gray-600"></i>
                    </button>
                </div>
                <div class="flex items-center gap-2">
                    <button id="clearHistoryBtn" class="p-2 hover:bg-gray-100 rounded-lg transition-colors" title="Clear History">
                        <i data-lucide="trash-2" class="w-4 h-4 text-gray-600"></i>
                    </button>
                    <div class="bg-blue-600 text-white px-2 py-1 rounded-full text-sm font-medium">
                        <span id="historyCounter">0</span>
                    </div>
                </div>
            </div>
            <div id="historyContent" class="max-h-0 overflow-hidden transition-all duration-300">
                <div id="historyList" class="max-h-96 overflow-y-auto">
                    <!-- History items will be populated here -->
                </div>
            </div>
        </div>
    </main>


    <!-- Settings Modal - Glassmorphism -->
    <div id="settingsModal" class="fixed inset-0 bg-black bg-opacity-50 backdrop-blur-sm flex items-center justify-center z-50 hidden p-4">
        <div class="bg-white bg-opacity-90 backdrop-blur-lg rounded-2xl p-6 sm:p-8 max-w-md w-full max-h-[90vh] overflow-y-auto shadow-2xl border border-white border-opacity-20">
            <div class="flex items-center justify-between mb-6">
                <h2 class="text-2xl font-semibold text-gray-900">Settings</h2>
                <button id="closeSettingsBtn" class="p-2 hover:bg-white hover:bg-opacity-20 rounded-lg transition-colors">
                    <i data-lucide="x" class="w-5 h-5 text-gray-600"></i>
                </button>
            </div>


            <!-- Voice Settings -->
            <div class="mb-6">
                <h3 class="text-lg font-medium text-gray-900 mb-4">Voice Settings</h3>
                
                <!-- Voice Speed -->
                <div class="mb-4">
                    <label for="voiceSpeed" class="flex items-center justify-between text-sm font-medium text-gray-700 mb-2">
                        <span>Voice Speed</span>
                        <span id="voiceSpeedValue" class="text-blue-600 font-semibold">1.0</span>
                    </label>
                    <input type="range" id="voiceSpeed" min="0.5" max="2.0" step="0.1" value="1.0" 
                           class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-blue-600">
                </div>
                
                <!-- Voice Pitch -->
                <div class="mb-4">
                    <label for="voicePitch" class="flex items-center justify-between text-sm font-medium text-gray-700 mb-2">
                        <span>Voice Pitch</span>
                        <span id="voicePitchValue" class="text-blue-600 font-semibold">1.0</span>
                    </label>
                    <input type="range" id="voicePitch" min="0.5" max="2.0" step="0.1" value="1.0" 
                           class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-blue-600">
                </div>
            </div>

            <!-- Translation Settings -->
            <div class="mb-6">
                <h3 class="text-lg font-medium text-gray-900 mb-4">Translation Settings</h3>
                
                <!-- Auto-Translate -->
                <div class="mb-3">
                    <label for="autoTranslate" class="flex items-center text-sm font-medium text-gray-900 cursor-pointer" id="autoTranslateLabel">
                        <input type="checkbox" id="autoTranslate" class="mr-3 w-5 h-5 text-blue-600 bg-white bg-opacity-50 backdrop-blur border-white border-opacity-30 rounded focus:ring-blue-500">
                        Auto-Translate (500ms after typing stops)
                    </label>
                </div>

                <!-- Translate on Enter -->
                <div class="mb-3">
                    <label for="translateOnEnter" class="flex items-center text-sm font-medium text-gray-900 cursor-pointer" id="translateOnEnterLabel">
                        <input type="checkbox" id="translateOnEnter" class="mr-3 w-5 h-5 text-blue-600 bg-white bg-opacity-50 backdrop-blur border-white border-opacity-30 rounded focus:ring-blue-500">
                        Translate on Enter
                    </label>
                </div>
                
                <!-- Save History -->
                <div class="mb-3">
                    <label for="saveHistory" class="flex items-center text-sm font-medium text-gray-900 cursor-pointer" id="saveHistoryLabel">
                        <input type="checkbox" id="saveHistory" class="mr-3 w-5 h-5 text-blue-600 bg-white bg-opacity-50 backdrop-blur border-white border-opacity-30 rounded focus:ring-blue-500">
                        Save History
                    </label>
                </div>
                
                <!-- Auto-Copy -->
                <div class="mb-3">
                    <label for="autoCopy" class="flex items-center text-sm font-medium text-gray-900 cursor-pointer" id="autoCopyLabel">
                        <input type="checkbox" id="autoCopy" class="mr-3 w-5 h-5 text-blue-600 bg-white bg-opacity-50 backdrop-blur border-white border-opacity-30 rounded focus:ring-blue-500">
                        Auto-Copy Translation
                    </label>
                </div>
                
                <!-- Auto-Clear -->
                <div class="mb-3">
                    <label for="autoClear" class="flex items-center text-sm font-medium text-gray-900 cursor-pointer" id="autoClearLabel">
                        <input type="checkbox" id="autoClear" class="mr-3 w-5 h-5 text-blue-600 bg-white bg-opacity-50 backdrop-blur border-white border-opacity-30 rounded focus:ring-blue-500">
                        Auto-Clear Input (30s after translation)
                    </label>
                </div>
            </div>

            <!-- Clear History Button -->
            <div class="pt-4 border-t border-gray-200">
                <button id="clearAllHistoryBtn" class="w-full bg-red-600 hover:bg-red-700 text-white font-medium py-3 px-4 rounded-lg transition-colors duration-200">
                    Clear All History
                </button>
            </div>
        </div>
    </div>

    <!-- Clear History Confirmation Modal -->
    <div id="clearHistoryModal" class="fixed inset-0 bg-black bg-opacity-50 backdrop-blur-sm flex items-center justify-center z-50 hidden transition-opacity duration-300">
        <div class="bg-white rounded-2xl p-6 max-w-md w-full mx-4 shadow-2xl transform transition-all duration-300 scale-95 opacity-0">
            <div class="flex items-center justify-center mb-4">
                <div class="w-12 h-12 bg-red-100 rounded-full flex items-center justify-center">
                    <i data-lucide="trash-2" class="w-6 h-6 text-red-600"></i>
                </div>
            </div>
            
            <h3 class="text-lg font-semibold text-gray-900 text-center mb-2">Clear All History</h3>
            <p class="text-gray-600 text-center mb-6">Are you sure you want to clear all translation history? This action cannot be undone.</p>
            
            <div class="flex gap-3">
                <button id="cancelClearBtn" class="flex-1 px-4 py-2 border border-gray-300 text-gray-700 rounded-lg hover:bg-gray-50 transition-colors font-medium">
                    Cancel
                </button>
                <button id="confirmClearBtn" class="flex-1 px-4 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700 transition-colors font-medium">
                    Clear All
                </button>
            </div>
        </div>
    </div>

    <!-- Toast Notifications Container -->
    <div id="toastContainer" class="fixed bottom-4 right-4 z-50 flex flex-col gap-2">
    </div>

    <script>
        // Language data with flags/emojis
        const languages = [
            { code: 'en', name: 'English', flag: 'en' },
            { code: 'es', name: 'Spanish', flag: 'es' },
            { code: 'fr', name: 'French', flag: 'fr' },
            { code: 'de', name: 'German', flag: 'de' },
            { code: 'it', name: 'Italian', flag: 'it' },
            { code: 'pt', name: 'Portuguese', flag: 'pt' },
            { code: 'ru', name: 'Russian', flag: 'ru' },
            { code: 'zh', name: 'Chinese', flag: 'zh' },
            { code: 'ja', name: 'Japanese', flag: 'ja' },
            { code: 'ko', name: 'Korean', flag: 'ko' },
            { code: 'ar', name: 'Arabic', flag: 'ar' },
            { code: 'hi', name: 'Hindi', flag: 'hi' },
            { code: 'th', name: 'Thai', flag: 'th' },
            { code: 'vi', name: 'Vietnamese', flag: 'vi' },
            { code: 'tr', name: 'Turkish', flag: 'tr' },
            { code: 'pl', name: 'Polish', flag: 'pl' },
            { code: 'nl', name: 'Dutch', flag: 'nl' },
            { code: 'sv', name: 'Swedish', flag: 'sv' },
            { code: 'da', name: 'Danish', flag: 'da' },
            { code: 'no', name: 'Norwegian', flag: 'no' },
            { code: 'fi', name: 'Finnish', flag: 'fi' },
            { code: 'el', name: 'Greek', flag: 'el' },
            { code: 'he', name: 'Hebrew', flag: 'he' },
            { code: 'cs', name: 'Czech', flag: 'cs' },
            { code: 'hu', name: 'Hungarian', flag: 'hu' },
            { code: 'ro', name: 'Romanian', flag: 'ro' },
            { code: 'uk', name: 'Ukrainian', flag: 'uk' },
            { code: 'bg', name: 'Bulgarian', flag: 'bg' },
            { code: 'hr', name: 'Croatian', flag: 'hr' },
            { code: 'sr', name: 'Serbian', flag: 'sr' },
            { code: 'sk', name: 'Slovak', flag: 'sk' },
            { code: 'sl', name: 'Slovenian', flag: 'sl' },
            { code: 'et', name: 'Estonian', flag: 'et' },
            { code: 'lv', name: 'Latvian', flag: 'lv' },
            { code: 'lt', name: 'Lithuanian', flag: 'lt' }
        ];

        // Application state
        let history = JSON.parse(localStorage.getItem('translationHistory') || '[]');
        let currentTranslation = null;
        let showFavoritesOnly = false;

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            // Check if all required elements exist
            if (!document.getElementById('translateBtn') || !document.getElementById('inputText')) {
                console.error('Required elements not found');
                return;
            }

            // Force voice loading
            if ('speechSynthesis' in window) {
                window.speechSynthesis.getVoices();
                window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
            }

            lucide.createIcons();
            initializeLanguageSelectors();
            loadHistory();
            setupEventListeners();
            updateCharacterCounter();
            setupAutoTranslate();
            loadSettings();

            // Hotkeys
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    translate();
                }
            });

            console.log("Script loaded successfully");
        });

        function initializeLanguageSelectors() {
            const sourceSelect = document.getElementById('sourceLanguage');
            const targetSelect = document.getElementById('targetLanguage');

            // Add auto-detect option to source language
            const autoOption = new Option('Detect Language', 'auto');
            sourceSelect.add(autoOption);

            languages.forEach(lang => {
                const option1 = new Option(`${lang.name}`, lang.code);
                const option2 = new Option(`${lang.name}`, lang.code);
                sourceSelect.add(option1);
                targetSelect.add(option2);
            });

            sourceSelect.value = 'auto';
            targetSelect.value = 'ru';
        }

        function setupEventListeners() {
            // Translation
            document.getElementById('translateBtn').addEventListener('click', translate);
            document.getElementById('swapBtn').addEventListener('click', swapLanguages);

            // Input controls
            document.getElementById('copyInputBtn').addEventListener('click', () => copyText('input'));
            document.getElementById('speakInputBtn').addEventListener('click', () => speakText('input'));
            document.getElementById('micBtn').addEventListener('click', startVoiceInput);

            // Output controls
            document.getElementById('copyOutputBtn').addEventListener('click', () => copyText('output'));
            document.getElementById('speakOutputBtn').addEventListener('click', () => speakText('output'));

            // Character counter
            document.getElementById('inputText').addEventListener('input', function(e) {
                // Prevent typing beyond limit
                const maxLength = 800;
                if (e.target.value.length > maxLength) {
                    e.target.value = e.target.value.substring(0, maxLength);
                }
                updateCharacterCounter();
            });
            
            // Enter key handler
            document.getElementById('inputText').addEventListener('keydown', handleEnterKey);


            // Settings
            document.getElementById('settingsBtn').addEventListener('click', openSettings);
            document.getElementById('closeSettingsBtn').addEventListener('click', closeSettings);

            // Settings controls
            document.getElementById('autoTranslate').addEventListener('change', saveAutoTranslate);
            document.getElementById('clearHistoryBtn').addEventListener('click', showClearHistoryModal);
            document.getElementById('translateOnEnter').addEventListener('change', saveTranslateOnEnter);
            
            // Voice settings
            document.getElementById('voiceSpeed').addEventListener('input', function(e) {
                document.getElementById('voiceSpeedValue').textContent = e.target.value;
                localStorage.setItem('voiceSpeed', e.target.value);
            });
            
            document.getElementById('voicePitch').addEventListener('input', function(e) {
                document.getElementById('voicePitchValue').textContent = e.target.value;
                localStorage.setItem('voicePitch', e.target.value);
            });
            
            // New settings
            document.getElementById('saveHistory').addEventListener('change', saveSaveHistory);
            document.getElementById('autoCopy').addEventListener('change', saveAutoCopy);
            document.getElementById('autoClear').addEventListener('change', saveAutoClear);
            
            // Clear All History button
            document.getElementById('clearAllHistoryBtn').addEventListener('click', showClearHistoryModal);

            // Clear history modal controls
            document.getElementById('cancelClearBtn').addEventListener('click', hideClearHistoryModal);
            document.getElementById('confirmClearBtn').addEventListener('click', confirmClearHistory);
            document.getElementById('clearHistoryModal').addEventListener('click', function(e) {
                if (e.target === this) {
                    hideClearHistoryModal();
                }
            });

            // History controls
            document.getElementById('historyHeader').addEventListener('click', toggleHistory);
            document.getElementById('favoriteFilterBtn').addEventListener('click', toggleFavoriteFilter);

            // Modal close on outside click
            document.getElementById('settingsModal').addEventListener('click', function(e) {
                if (e.target === this) {
                    closeSettings();
                }
            });

        }

        // Settings Functions
        function openSettings() {
            document.getElementById('settingsModal').classList.remove('hidden');
        }

        function closeSettings() {
            document.getElementById('settingsModal').classList.add('hidden');
        }

        function saveTranslateOnEnter() {
            const enabled = document.getElementById('translateOnEnter').checked;
            localStorage.setItem('translateOnEnter', enabled);
        }
        
        function saveSaveHistory() {
            const enabled = document.getElementById('saveHistory').checked;
            localStorage.setItem('saveHistory', enabled);
        }
        
        function saveAutoCopy() {
            const enabled = document.getElementById('autoCopy').checked;
            localStorage.setItem('autoCopy', enabled);
        }
        
        function saveAutoClear() {
            const enabled = document.getElementById('autoClear').checked;
            localStorage.setItem('autoClear', enabled);
        }

        function handleEnterKey(event) {
            // Check if Translate on Enter is enabled
            const translateOnEnter = document.getElementById('translateOnEnter').checked;
            
            // If Enter is pressed without Shift and Translate on Enter is enabled
            if (event.key === 'Enter' && !event.shiftKey && translateOnEnter) {
                event.preventDefault(); // Prevent default Enter behavior (new line)
                translate();
            }
        }

        function saveAutoTranslate() {
            const enabled = document.getElementById('autoTranslate').checked;
            localStorage.setItem('autoTranslate', enabled);
            setupAutoTranslate(); // Re-setup auto-translate when toggle changes
        }


        function showClearHistoryModal() {
            const modal = document.getElementById('clearHistoryModal');
            const content = modal.querySelector('div > div');
            
            modal.classList.remove('hidden');
            
            // Animate in
            setTimeout(() => {
                modal.classList.add('opacity-100');
                content.classList.remove('scale-95', 'opacity-0');
                content.classList.add('scale-100', 'opacity-100');
            }, 10);
        }

        function hideClearHistoryModal() {
            const modal = document.getElementById('clearHistoryModal');
            const content = modal.querySelector('div > div');
            
            // Animate out
            modal.classList.remove('opacity-100');
            content.classList.remove('scale-100', 'opacity-100');
            content.classList.add('scale-95', 'opacity-0');
            
            setTimeout(() => {
                modal.classList.add('hidden');
            }, 300);
        }

        function confirmClearHistory() {
            history = [];
            localStorage.setItem('translationHistory', JSON.stringify(history));
            loadHistory();
            hideClearHistoryModal();
        }

        function clearHistory() {
            showClearHistoryModal();
        }

        function toggleHistory() {
            const content = document.getElementById('historyContent');
            const chevron = document.getElementById('historyChevron');
            const isOpen = !content.classList.contains('max-h-0');
            
            if (isOpen) {
                content.classList.remove('max-h-96');
                content.classList.add('max-h-0');
                chevron.style.transform = 'rotate(0deg)';
                localStorage.setItem('historyOpen', 'false');
            } else {
                content.classList.remove('max-h-0');
                content.classList.add('max-h-96');
                chevron.style.transform = 'rotate(180deg)';
                localStorage.setItem('historyOpen', 'true');
            }
        }

        function loadSettings() {
            // Load Voice Settings
            const savedVoiceSpeed = localStorage.getItem('voiceSpeed');
            const savedVoicePitch = localStorage.getItem('voicePitch');
            if (savedVoiceSpeed) {
                document.getElementById('voiceSpeed').value = savedVoiceSpeed;
                document.getElementById('voiceSpeedValue').textContent = savedVoiceSpeed;
            }
            if (savedVoicePitch) {
                document.getElementById('voicePitch').value = savedVoicePitch;
                document.getElementById('voicePitchValue').textContent = savedVoicePitch;
            }

            // Load Auto-Translate
            const savedAutoTranslate = localStorage.getItem('autoTranslate');
            if (savedAutoTranslate) {
                document.getElementById('autoTranslate').checked = savedAutoTranslate === 'true';
            }

            // Load Translate on Enter
            const savedTranslateOnEnter = localStorage.getItem('translateOnEnter');
            if (savedTranslateOnEnter) {
                document.getElementById('translateOnEnter').checked = savedTranslateOnEnter === 'true';
            }

            // Load Save History (default to true)
            const savedSaveHistory = localStorage.getItem('saveHistory');
            if (savedSaveHistory) {
                document.getElementById('saveHistory').checked = savedSaveHistory === 'true';
            } else {
                document.getElementById('saveHistory').checked = true;
                localStorage.setItem('saveHistory', 'true');
            }

            // Load Auto-Copy
            const savedAutoCopy = localStorage.getItem('autoCopy');
            if (savedAutoCopy) {
                document.getElementById('autoCopy').checked = savedAutoCopy === 'true';
            }

            // Load Auto-Clear
            const savedAutoClear = localStorage.getItem('autoClear');
            if (savedAutoClear) {
                document.getElementById('autoClear').checked = savedAutoClear === 'true';
            }

            // Load history state
            const savedHistoryOpen = localStorage.getItem('historyOpen');
            if (savedHistoryOpen === 'true') {
                const content = document.getElementById('historyContent');
                const chevron = document.getElementById('historyChevron');
                content.classList.remove('max-h-0');
                content.classList.add('max-h-96');
                chevron.style.transform = 'rotate(180deg)';
            }
        }


        function updateCharacterCounter() {
            const text = document.getElementById('inputText').value;
            const counter = document.getElementById('charCounter');
            const length = text.length;
            const maxLength = 800;
            const percentage = (length / maxLength) * 100;
            
            // Update counter text with new format
            counter.textContent = `Characters: ${length} (${Math.round(percentage)}%)`;
            
            // Update counter color based on percentage with smooth gradient
            counter.className = 'text-sm transition-colors duration-300 ';
            
            if (percentage >= 85) {
                counter.className += 'text-red-500 font-semibold';
            } else if (percentage >= 50) {
                counter.className += 'text-orange-500';
            } else {
                counter.className += 'text-green-500';
            }
        }

        function swapLanguages() {
            const sourceSelect = document.getElementById('sourceLanguage');
            const targetSelect = document.getElementById('targetLanguage');
            const inputText = document.getElementById('inputText');
            const outputText = document.getElementById('outputText');

            // Save current text values
            const currentInput = inputText.value;
            const currentOutput = outputText.textContent.trim();

            // Handle auto in source language
            if (sourceSelect.value === 'auto') {
                // If source is auto, set it to the target language before swapping
                sourceSelect.value = targetSelect.value;
            }

            // Swap languages
            const tempLang = sourceSelect.value;
            sourceSelect.value = targetSelect.value;
            targetSelect.value = tempLang;

            // Swap text content
            inputText.value = currentOutput;
            outputText.innerHTML = currentInput ? `<span class="text-gray-900">${escapeHtml(currentInput)}</span>` : '';

            // Update character counter
            updateCharacterCounter();
        }

        let autoTranslateTimeout;

        async function translate() {
            const inputText = document.getElementById('inputText').value.trim();
            const sourceLang = document.getElementById('sourceLanguage').value;
            const targetLang = document.getElementById('targetLanguage').value;

            if (!inputText || inputText.trim() === '') {
                displayTranslation('Please enter text to translate');
                return;
            }

            const btn = document.getElementById('translateBtn');
            btn.textContent = 'Translating...';
            btn.disabled = true;

            try {
                // Google Translate API - proper auto-detect handling
                let url;
                if (sourceLang === 'auto') {
                    // For auto-detect, pass sl=auto
                    url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=${targetLang}&dt=t&q=${encodeURIComponent(inputText)}`;
                } else {
                    // For specified source language, include sl parameter
                    url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=${sourceLang}&tl=${targetLang}&dt=t&q=${encodeURIComponent(inputText)}`;
                }
                    
                const result = await fetch(url);
                const data = await result.json();

                if (data && data[0] && data[0][0] && data[0][0][0]) {
                    const translatedText = data[0][0][0];
                    // Get detected language if auto was used (Google returns it in data[2])
                    const detectedLang = sourceLang === 'auto' && data[2] ? data[2] : sourceLang;
                    displayTranslation(translatedText);
                    
                    // Auto-Copy functionality
                    const autoCopyEnabled = document.getElementById('autoCopy').checked;
                    if (autoCopyEnabled) {
                        navigator.clipboard.writeText(translatedText).then(() => {
                            showToast('Copied!');
                        }).catch(err => {
                            console.error('Auto-copy failed:', err);
                        });
                    }
                    
                    // Save History functionality
                    const saveHistoryEnabled = document.getElementById('saveHistory').checked;
                    if (saveHistoryEnabled) {
                        addToHistory(inputText, translatedText, detectedLang, targetLang);
                    }
                    
                    currentTranslation = { input: inputText, output: translatedText, sourceLang: detectedLang, targetLang };
                    
                    // Auto-Clear functionality
                    const autoClearEnabled = document.getElementById('autoClear').checked;
                    if (autoClearEnabled) {
                        setTimeout(() => {
                            const inputElement = document.getElementById('inputText');
                            if (inputElement.value === inputText) { // Only clear if input hasn't changed
                                inputElement.value = '';
                                updateCharacterCounter();
                            }
                        }, 30000); // 30 seconds
                    }
                } else {
                    displayTranslation('Translation error');
                }
            } catch (error) {
                console.error('Translation error:', error);
                displayTranslation('Translation error');
            } finally {
                btn.textContent = 'Translate';
                btn.disabled = false;
            }
        }

        function setupAutoTranslate() {
            const inputText = document.getElementById('inputText');

            // Remove existing listener to avoid duplicates
            inputText.removeEventListener('input', autoTranslateHandler);

            // Add listener if auto-translate is enabled
            if (document.getElementById('autoTranslate').checked) {
                inputText.addEventListener('input', autoTranslateHandler);
            }
        }

        function autoTranslateHandler() {
            clearTimeout(autoTranslateTimeout);
            autoTranslateTimeout = setTimeout(() => {
                const inputText = document.getElementById('inputText');
                if (inputText.value.trim()) {
                    translate();
                }
            }, 500);
        }

        function displayTranslation(text) {
            const outputElement = document.getElementById('outputText');
            outputElement.innerHTML = `<span class="text-gray-900">${escapeHtml(text)}</span>`;
        }

        function copyText(type) {
            let textToCopy = '';
            if (type === 'input') {
                textToCopy = document.getElementById('inputText').value;
            } else if (type === 'output') {
                textToCopy = document.getElementById('outputText').textContent;
            }

            if (textToCopy && textToCopy.trim()) {
                navigator.clipboard.writeText(textToCopy).then(() => {
                    showToast('Copied to clipboard!');
                }).catch(err => {
                    console.error('Failed to copy text: ', err);
                    showToast('Failed to copy');
                });
            }
        }

        function speakText(type) {
            if (!('speechSynthesis' in window)) {
                showToast('Text-to-speech not supported in your browser');
                return;
            }

            // Check if currently speaking, then stop
            if (window.speechSynthesis.speaking) {
                window.speechSynthesis.cancel();
                // Remove visual feedback from both buttons
                document.querySelectorAll('.speak-btn-active').forEach(btn => {
                    btn.classList.remove('speak-btn-active', 'bg-blue-600', 'text-white');
                    btn.classList.add('hover:bg-gray-100');
                });
                return;
            }

            let textToSpeak = '';
            let lang = '';

            if (type === 'input') {
                textToSpeak = document.getElementById('inputText').value;
                lang = document.getElementById('sourceLanguage').value;
            } else if (type === 'output') {
                textToSpeak = document.getElementById('outputText').textContent;
                lang = document.getElementById('targetLanguage').value;
            }

            if (!textToSpeak || !textToSpeak.trim()) {
                showToast('No text to speak');
                return;
            }

            // Convert language code to proper format for TTS
            const langMap = {
                'en': 'en-US',
                'es': 'es-ES',
                'fr': 'fr-FR',
                'de': 'de-DE',
                'it': 'it-IT',
                'pt': 'pt-PT',
                'ru': 'ru-RU',
                'zh': 'zh-CN',
                'ja': 'ja-JP',
                'ko': 'ko-KR',
                'ar': 'ar-SA',
                'hi': 'hi-IN',
                'th': 'th-TH',
                'vi': 'vi-VN',
                'tr': 'tr-TR',
                'pl': 'pl-PL',
                'nl': 'nl-NL',
                'sv': 'sv-SE',
                'da': 'da-DK',
                'no': 'no-NO',
                'fi': 'fi-FI',
                'el': 'el-GR',
                'he': 'he-IL',
                'cs': 'cs-CZ',
                'hu': 'hu-HU',
                'ro': 'ro-RO',
                'uk': 'uk-UA',
                'bg': 'bg-BG',
                'hr': 'hr-HR',
                'sk': 'sk-SK',
                'sl': 'sl-SI',
                'et': 'et-EE',
                'lv': 'lv-LV',
                'lt': 'lt-LT'
            };

            const properLang = langMap[lang] || lang;

            function speakWithVoices() {
                try {
                    // Cancel any ongoing speech
                    window.speechSynthesis.cancel();
                    
                    // Get available voices and find the best match
                    const voices = window.speechSynthesis.getVoices();
                    let selectedVoice = null;
                    
                    // Smart voice selection - try to find voice by language code inclusion
                    if (voices.length > 0) {
                        selectedVoice = voices.find(voice => 
                            voice.lang.toLowerCase().includes(properLang.toLowerCase().split('-')[0])
                        ) || voices.find(voice => 
                            voice.lang.toLowerCase().includes(lang.toLowerCase())
                        ) || voices[0]; // fallback to first available voice
                    }
                    
                    // Add visual feedback to the correct button
                    const buttonId = type === 'input' ? 'speakInputBtn' : 'speakOutputBtn';
                    const button = document.getElementById(buttonId);
                    
                    if (!button) return;
                    
                    button.classList.add('speak-btn-active', 'bg-blue-600', 'text-white');
                    button.classList.remove('hover:bg-gray-100');
                    const icon = button.querySelector('i');
                    if (icon) {
                        icon.classList.add('text-white');
                        icon.classList.remove('text-gray-600');
                    }
                    
                    const utterance = new SpeechSynthesisUtterance(textToSpeak);
                    utterance.lang = properLang;
                    utterance.rate = parseFloat(document.getElementById('voiceSpeed').value);
                    utterance.pitch = parseFloat(document.getElementById('voicePitch').value);
                    utterance.volume = 1;
                    
                    // Assign the selected voice
                    if (selectedVoice) {
                        utterance.voice = selectedVoice;
                    }
                    
                    // Remove visual feedback when speech ends
                    utterance.onend = () => {
                        if (button) {
                            button.classList.remove('speak-btn-active', 'bg-blue-600', 'text-white');
                            button.classList.add('hover:bg-gray-100');
                            const icon = button.querySelector('i');
                            if (icon) {
                                icon.classList.remove('text-white');
                                icon.classList.add('text-gray-600');
                            }
                        }
                    };
                    
                    window.speechSynthesis.speak(utterance);
                } catch (error) {
                    console.error('Speech synthesis error:', error);
                    // Only show error if no voices are available at all
                    if (window.speechSynthesis.getVoices().length === 0) {
                        showToast('Your browser doesn\'t support text-to-speech');
                    }
                }
            }

            // Check if voices are loaded, wait for them if needed
            const voices = speechSynthesis.getVoices();
            if (voices.length === 0) {
                speechSynthesis.onvoiceschanged = speakWithVoices;
                // Also try to load voices manually
                if (speechSynthesis.onvoiceschanged !== null) {
                    speechSynthesis.onvoiceschanged();
                }
            } else {
                speakWithVoices();
            }
        }

        let isRecording = false;
        let currentRecognition = null;

        function startVoiceInput() {
            if (isRecording) {
                stopVoiceInput();
                return;
            }

            if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                const recognition = new SpeechRecognition();
                currentRecognition = recognition;

                recognition.continuous = false;
                recognition.interimResults = false;
                recognition.lang = document.getElementById('sourceLanguage').value;

                // Visual indication - make mic button red
                const micBtn = document.getElementById('micBtn');
                if (!micBtn) return;
                
                const micIcon = micBtn.querySelector('i');
                if (!micIcon) return;
                
                micBtn.classList.add('bg-red-100');
                micIcon.classList.remove('text-gray-600');
                micIcon.classList.add('text-red-600');
                isRecording = true;

                recognition.onresult = function(event) {
                    const transcript = event.results[0][0].transcript;
                    document.getElementById('inputText').value = transcript;
                    updateCharacterCounter();
                    stopVoiceInput();
                };

                recognition.onerror = function(event) {
                    console.error('Speech recognition error:', event.error);
                    showNotification('Speech recognition error: ' + event.error);
                    stopVoiceInput();
                };

                recognition.onend = function() {
                    stopVoiceInput();
                };

                try {
                    recognition.start();
                } catch (error) {
                    console.error('Failed to start recognition:', error);
                    stopVoiceInput();
                }
            } else {
                showNotification('Speech recognition not supported');
            }
        }

        function stopVoiceInput() {
            if (currentRecognition) {
                currentRecognition.stop();
                currentRecognition = null;
            }
            
            // Reset visual indication
            const micBtn = document.getElementById('micBtn');
            if (!micBtn) return;
            
            const micIcon = micBtn.querySelector('i');
            if (!micIcon) return;
            
            micBtn.classList.remove('bg-red-100');
            micIcon.classList.remove('text-red-600');
            micIcon.classList.add('text-gray-600');
            isRecording = false;
        }

        function addToHistory(input, output, fromLang, toLang) {
            const historyItem = {
                id: Date.now(),
                input,
                output,
                fromLang,
                toLang,
                timestamp: new Date().toISOString(),
                isFavorite: false
            };

            history.unshift(historyItem);
            // Keep only last 10 items
            if (history.length > 10) {
                history = history.slice(0, 10);
            }
            localStorage.setItem('translationHistory', JSON.stringify(history));
            loadHistory();
        }

        function toggleFavorite(id) {
            const item = history.find(h => h.id === id);
            if (item) {
                item.isFavorite = !item.isFavorite;
                localStorage.setItem('translationHistory', JSON.stringify(history));
                loadHistory();
            }
        }

        function loadHistory() {
            const historyList = document.getElementById('historyList');
            const historyCounter = document.getElementById('historyCounter');
            const favoriteBtn = document.getElementById('favoriteFilterBtn');
            
            // Check if essential elements exist
            if (!historyList || !historyCounter) {
                console.error('History elements not found');
                return;
            }

            // Filter history based on favorite filter
            const filteredHistory = showFavoritesOnly ? history.filter(item => item.isFavorite) : history;
            
            // Update counter with filtered count
            historyCounter.textContent = filteredHistory.length;

            if (filteredHistory.length === 0) {
                const emptyMessage = showFavoritesOnly 
                    ? '<div class="p-4 text-center text-gray-500"><p>No favorite translations yet...</p></div>'
                    : '<div class="p-4 text-center text-gray-500"><p>No history yet...</p></div>';
                historyList.innerHTML = emptyMessage;
                return;
            }

            historyList.innerHTML = filteredHistory.map(item => `
                <div class="history-item p-4 flex items-start gap-3">
                    <div class="flex-shrink-0 mt-1">
                        <i data-lucide="clock" class="w-4 h-4 text-gray-400"></i>
                    </div>
                    <div class="flex-1 min-w-0">
                        <div class="text-sm text-gray-900 mb-1">${escapeHtml(item.input.substring(0, 100))}${item.input.length > 100 ? '...' : ''}</div>
                        <div class="text-sm text-gray-600">${escapeHtml(item.output.substring(0, 100))}${item.output.length > 100 ? '...' : ''}</div>
                        <div class="text-xs text-gray-400 mt-1">${getLanguageName(item.fromLang)} ${getLanguageName(item.toLang)} · ${formatTime(item.timestamp)}</div>
                    </div>
                    <div class="flex items-center gap-1">
                        <button onclick="event.stopPropagation(); toggleFavorite(${item.id})" class="p-1 hover:bg-gray-100 rounded transition-colors">
                            <i data-lucide="${item.isFavorite ? 'star' : 'star'}" class="w-4 h-4 ${item.isFavorite ? 'text-yellow-500 fill-yellow-500' : 'text-gray-400'}"></i>
                        </button>
                        <button onclick="event.stopPropagation(); deleteHistoryItem(${item.id})" class="p-1 hover:bg-gray-100 rounded transition-colors">
                            <i data-lucide="trash-2" class="w-4 h-4 text-gray-400"></i>
                        </button>
                    </div>
                </div>
            `).join('');

            // Update favorite button appearance only if elements exist
            if (favoriteBtn) {
                const favoriteIcon = favoriteBtn.querySelector('i');
                if (favoriteIcon) {
                    if (showFavoritesOnly) {
                        favoriteIcon.classList.remove('text-gray-600');
                        favoriteIcon.classList.add('text-yellow-500', 'fill-yellow-500');
                    } else {
                        favoriteIcon.classList.remove('text-yellow-500', 'fill-yellow-500');
                        favoriteIcon.classList.add('text-gray-600');
                    }
                }
            }

            lucide.createIcons();
        }

        function toggleFavoriteFilter() {
            showFavoritesOnly = !showFavoritesOnly;
            loadHistory();
        }

        function getLanguageName(code) {
            const lang = languages.find(l => l.code === code);
            return lang ? lang.name : code;
        }

        function formatTime(timestamp) {
            const date = new Date(timestamp);
            const now = new Date();
            const diff = now - date;

            if (diff < 60000) return 'just now';
            if (diff < 3600000) return `${Math.floor(diff / 60000)} min ago`;
            if (diff < 86400000) return `${Math.floor(diff / 3600000)} hours ago`;
            return `${Math.floor(diff / 86400000)} days ago`;
        }

        function toggleFavorite(id) {
            const item = history.find(h => h.id === id);
            if (item) {
                item.isFavorite = !item.isFavorite;
                localStorage.setItem('translationHistory', JSON.stringify(history));
                loadHistory();
            }
        }

        function deleteHistoryItem(id) {
            history = history.filter(h => h.id !== id);
            localStorage.setItem('translationHistory', JSON.stringify(history));
            loadHistory();
        }

        function showToast(message) {
            const toast = document.createElement('div');
            toast.className = 'bg-white text-gray-900 px-4 py-3 rounded-lg shadow-lg border border-gray-200 transform transition-all duration-300 translate-x-full opacity-0';
            toast.textContent = message;
            
            const container = document.getElementById('toastContainer');
            container.appendChild(toast);
            
            // Animate in
            setTimeout(() => {
                toast.classList.remove('translate-x-full', 'opacity-0');
                toast.classList.add('translate-x-0', 'opacity-100');
            }, 10);
            
            // Remove after 2 seconds
            setTimeout(() => {
                toast.classList.remove('translate-x-0', 'opacity-100');
                toast.classList.add('translate-x-full', 'opacity-0');
                setTimeout(() => toast.remove(), 300);
            }, 2000);
        }

        function showNotification(message) {
            showToast(message);
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        console.log("Script loaded successfully");
    </script>
</body>
</html>
