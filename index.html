<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Translator Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        * {
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: #f5f5f5;
            background-image: radial-gradient(circle, #e0e0e0 1px, transparent 1px);
            background-size: 20px 20px;
        }

        .card-shadow {
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        .purple-circle {
            background-color: #8b5cf6;
        }

        .language-dropdown {
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%236b7280' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e");
            background-position: right 0.5rem center;
            background-repeat: no-repeat;
            background-size: 1.5em 1.5em;
            padding-right: 2.5rem;
        }

        .history-item {
            transition: all 0.2s ease;
        }

        .history-item:hover {
            background-color: #f9fafb;
        }

            </style>
</head>
<body class="min-h-screen">
    <!-- Header -->
    <header class="bg-white border-b border-gray-200 px-6 py-4">
        <div class="flex items-center justify-between max-w-7xl mx-auto">
            <!-- Left side - Title with icon -->
            <div class="flex items-center gap-3">
                <div class="purple-circle w-10 h-10 rounded-full flex items-center justify-center">
                    <span class="text-white font-bold text-lg">T</span>
                </div>
                <h1 class="text-2xl font-semibold text-gray-900">Translator Pro</h1>
            </div>

            <!-- Right side - Control icons -->
            <div class="flex items-center gap-4">
                <button class="p-2 hover:bg-gray-100 rounded-lg transition-colors">
                    <i data-lucide="monitor" class="w-5 h-5 text-gray-600"></i>
                </button>
                <button id="settingsBtn" class="p-2 hover:bg-gray-100 rounded-lg transition-colors">
                    <i data-lucide="settings" class="w-5 h-5 text-gray-600"></i>
                </button>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-6 py-6">
        <!-- Language Selection with Swap Button -->
        <div class="flex flex-col sm:flex-row items-center justify-center gap-2 sm:gap-4 mb-6">
            <div class="flex items-center gap-2">
                <!-- From Language -->
                <select id="sourceLanguage" class="w-28 sm:w-32 px-3 sm:px-4 py-2 sm:py-3 pr-10 border border-gray-200 rounded-xl text-gray-900 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent language-dropdown bg-transparent appearance-none shadow-sm">
                    <!-- Languages will be populated by JavaScript -->
                </select>

                <!-- Language Swap Button -->
                <button id="swapBtn" class="bg-blue-600 hover:bg-blue-700 text-white w-8 h-8 sm:w-10 sm:h-10 rounded-md flex items-center justify-center transition-all hover:scale-110 card-shadow">
                    &#x21C4;
                </button>

                <!-- To Language -->
                <select id="targetLanguage" class="w-28 sm:w-32 px-3 sm:px-4 py-2 sm:py-3 pr-10 border border-gray-200 rounded-xl text-gray-900 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent language-dropdown bg-transparent appearance-none shadow-sm">
                    <!-- Languages will be populated by JavaScript -->
                </select>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <!-- Left Column - Input -->
            <div class="bg-white rounded-xl border border-gray-200 card-shadow">
                <!-- Input Text Area -->
                <div class="p-4">
                    <label for="inputText" class="text-sm text-gray-600 font-medium sr-only">Input Text</label>
                    <textarea id="inputText" rows="8"
                              class="w-full px-3 py-2 border border-gray-300 rounded-lg text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent resize-none"
                              placeholder="Введите текст..."></textarea>

                    <!-- Character Counter -->
                    <div class="flex justify-between items-end mt-2 text-sm text-gray-500">
                        <span id="charCounter">0 characters</span>
                    </div>
                </div>

                <!-- Input Controls -->
                <div class="flex items-center justify-between p-4 border-t border-gray-200">
                    <div class="flex items-center gap-2">
                        <button id="copyInputBtn" class="p-2 hover:bg-gray-100 rounded-lg transition-colors" title="Copy">
                            <i data-lucide="copy" class="w-4 h-4 text-gray-600"></i>
                        </button>
                        <button id="speakInputBtn" class="p-2 hover:bg-gray-100 rounded-lg transition-colors" title="Speak">
                            <i data-lucide="volume-2" class="w-4 h-4 text-gray-600"></i>
                        </button>
                        <button id="micBtn" class="p-2 hover:bg-gray-100 rounded-lg transition-colors" title="Voice Input">
                            <i data-lucide="mic" class="w-4 h-4 text-gray-600"></i>
                        </button>
                    </div>

                    <!-- Translate Button -->
                    <button id="translateBtn" class="bg-blue-600 hover:bg-blue-700 text-white px-3 py-1.5 rounded-lg transition-colors font-medium text-sm">
                        Translate
                    </button>
                </div>
            </div>

            <!-- Right Column - Output -->
            <div class="bg-white rounded-xl border border-gray-200 card-shadow">
                <!-- Output Text Area -->
                <div class="p-4">
                    <label for="outputText" class="text-sm text-gray-600 font-medium sr-only">Output Text</label>
                    <div id="outputText" class="w-full min-h-[200px] px-3 py-2 border border-gray-300 rounded-lg text-gray-900 bg-gray-50 resize-none overflow-auto">
                    </div>
                </div>

                <!-- Output Controls -->
                <div class="flex items-center justify-between p-4 border-t border-gray-200">
                    <div class="flex items-center gap-2">
                        <button id="copyOutputBtn" class="p-2 hover:bg-gray-100 rounded-lg transition-colors" title="Copy">
                            <i data-lucide="copy" class="w-4 h-4 text-gray-600"></i>
                        </button>
                        <button id="speakOutputBtn" class="p-2 hover:bg-gray-100 rounded-lg transition-colors" title="Speak">
                            <i data-lucide="volume-2" class="w-4 h-4 text-gray-600"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Recent History Section -->
        <div class="mt-8 bg-white rounded-xl border border-gray-200 card-shadow w-full max-w-6xl mx-auto">
            <div id="historyHeader" class="flex items-center justify-between p-4 border-b border-gray-200 cursor-pointer hover:bg-gray-50 transition-colors">
                <div class="flex items-center gap-2">
                    <i id="historyChevron" data-lucide="chevron-down" class="w-5 h-5 text-gray-600 transition-transform duration-200"></i>
                    <h2 class="text-lg font-semibold text-gray-900">Recent History</h2>
                </div>
                <div class="flex items-center gap-2">
                    <button id="clearHistoryBtn" class="p-2 hover:bg-gray-100 rounded-lg transition-colors" title="Clear History">
                        <i data-lucide="trash-2" class="w-4 h-4 text-gray-600"></i>
                    </button>
                    <div class="bg-blue-600 text-white px-2 py-1 rounded-full text-sm font-medium">
                        <span id="historyCounter">0</span>
                    </div>
                </div>
            </div>
            <div id="historyContent" class="max-h-0 overflow-hidden transition-all duration-300">
                <div id="historyList" class="max-h-96 overflow-y-auto">
                    <!-- History items will be populated here -->
                </div>
            </div>
        </div>
    </main>


    <!-- Settings Modal - Glassmorphism -->
    <div id="settingsModal" class="fixed inset-0 bg-black bg-opacity-50 backdrop-blur-sm flex items-center justify-center z-50 hidden">
        <div class="bg-white bg-opacity-90 backdrop-blur-lg rounded-2xl p-8 max-w-md w-full mx-4 shadow-2xl border border-white border-opacity-20">
            <div class="flex items-center justify-between mb-6">
                <h2 class="text-2xl font-semibold text-gray-900">Settings</h2>
                <button id="closeSettingsBtn" class="p-2 hover:bg-white hover:bg-opacity-20 rounded-lg transition-colors">
                    <i data-lucide="x" class="w-5 h-5 text-gray-600"></i>
                </button>
            </div>


            <!-- Auto-Translate -->
            <div class="mb-6">
                <label for="autoTranslate" class="flex items-center text-sm font-medium text-gray-900 cursor-pointer" id="autoTranslateLabel">
                    <input type="checkbox" id="autoTranslate" class="mr-3 w-5 h-5 text-blue-600 bg-white bg-opacity-50 backdrop-blur border-white border-opacity-30 rounded focus:ring-blue-500">
                    Auto-Translate (500ms after typing stops)
                </label>
            </div>

            
            <!-- Translate on Enter -->
            <div class="mb-6">
                <label for="translateOnEnter" class="flex items-center text-sm font-medium text-gray-900 cursor-pointer" id="translateOnEnterLabel">
                    <input type="checkbox" id="translateOnEnter" class="mr-3 w-5 h-5 text-blue-600 bg-white bg-opacity-50 backdrop-blur border-white border-opacity-30 rounded focus:ring-blue-500">
                    Translate on Enter
                </label>
            </div>
        </div>
    </div>

    <script>
        // Language data with flags/emojis
        const languages = [
            { code: 'en', name: 'English', flag: 'en' },
            { code: 'es', name: 'Spanish', flag: 'es' },
            { code: 'fr', name: 'French', flag: 'fr' },
            { code: 'de', name: 'German', flag: 'de' },
            { code: 'it', name: 'Italian', flag: 'it' },
            { code: 'pt', name: 'Portuguese', flag: 'pt' },
            { code: 'ru', name: 'Russian', flag: 'ru' },
            { code: 'zh', name: 'Chinese', flag: 'zh' },
            { code: 'ja', name: 'Japanese', flag: 'ja' },
            { code: 'ko', name: 'Korean', flag: 'ko' },
            { code: 'ar', name: 'Arabic', flag: 'ar' },
            { code: 'hi', name: 'Hindi', flag: 'hi' },
            { code: 'th', name: 'Thai', flag: 'th' },
            { code: 'vi', name: 'Vietnamese', flag: 'vi' },
            { code: 'tr', name: 'Turkish', flag: 'tr' },
            { code: 'pl', name: 'Polish', flag: 'pl' },
            { code: 'nl', name: 'Dutch', flag: 'nl' },
            { code: 'sv', name: 'Swedish', flag: 'sv' },
            { code: 'da', name: 'Danish', flag: 'da' },
            { code: 'no', name: 'Norwegian', flag: 'no' },
            { code: 'fi', name: 'Finnish', flag: 'fi' },
            { code: 'el', name: 'Greek', flag: 'el' },
            { code: 'he', name: 'Hebrew', flag: 'he' },
            { code: 'cs', name: 'Czech', flag: 'cs' },
            { code: 'hu', name: 'Hungarian', flag: 'hu' },
            { code: 'ro', name: 'Romanian', flag: 'ro' },
            { code: 'uk', name: 'Ukrainian', flag: 'uk' },
            { code: 'bg', name: 'Bulgarian', flag: 'bg' },
            { code: 'hr', name: 'Croatian', flag: 'hr' },
            { code: 'sr', name: 'Serbian', flag: 'sr' },
            { code: 'sk', name: 'Slovak', flag: 'sk' },
            { code: 'sl', name: 'Slovenian', flag: 'sl' },
            { code: 'et', name: 'Estonian', flag: 'et' },
            { code: 'lv', name: 'Latvian', flag: 'lv' },
            { code: 'lt', name: 'Lithuanian', flag: 'lt' }
        ];

        // Application state
        let history = JSON.parse(localStorage.getItem('translationHistory') || '[]');
        let currentTranslation = null;

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            lucide.createIcons();
            initializeLanguageSelectors();
            loadHistory();
            setupEventListeners();
            updateCharacterCounter();
            setupAutoTranslate();
        });

        function initializeLanguageSelectors() {
            const sourceSelect = document.getElementById('sourceLanguage');
            const targetSelect = document.getElementById('targetLanguage');

            languages.forEach(lang => {
                const option1 = new Option(`${lang.name}`, lang.code);
                const option2 = new Option(`${lang.name}`, lang.code);
                sourceSelect.add(option1);
                targetSelect.add(option2);
            });

            sourceSelect.value = 'en';
            targetSelect.value = 'ru';
        }

        function setupEventListeners() {
            // Translation
            document.getElementById('translateBtn').addEventListener('click', translate);
            document.getElementById('swapBtn').addEventListener('click', swapLanguages);

            // Input controls
            document.getElementById('copyInputBtn').addEventListener('click', () => copyText('input'));
            document.getElementById('speakInputBtn').addEventListener('click', () => speakText('input'));
            document.getElementById('micBtn').addEventListener('click', startVoiceInput);

            // Output controls
            document.getElementById('copyOutputBtn').addEventListener('click', () => copyText('output'));
            document.getElementById('speakOutputBtn').addEventListener('click', () => speakText('output'));

            // Character counter
            document.getElementById('inputText').addEventListener('input', updateCharacterCounter);
            
            // Enter key handler
            document.getElementById('inputText').addEventListener('keydown', handleEnterKey);


            // Settings
            document.getElementById('settingsBtn').addEventListener('click', openSettings);
            document.getElementById('closeSettingsBtn').addEventListener('click', closeSettings);

            // Settings controls
            document.getElementById('autoTranslate').addEventListener('change', saveAutoTranslate);
            document.getElementById('clearHistoryBtn').addEventListener('click', clearHistory);
            document.getElementById('translateOnEnter').addEventListener('change', saveTranslateOnEnter);

            // History toggle
            document.getElementById('historyHeader').addEventListener('click', toggleHistory);

            // Modal close on outside click
            document.getElementById('settingsModal').addEventListener('click', function(e) {
                if (e.target === this) {
                    closeSettings();
                }
            });

            // Load saved settings
            loadSettings();
        }

        // Settings Functions
        function openSettings() {
            document.getElementById('settingsModal').classList.remove('hidden');
        }

        function closeSettings() {
            document.getElementById('settingsModal').classList.add('hidden');
        }

        function saveTranslateOnEnter() {
            const enabled = document.getElementById('translateOnEnter').checked;
            localStorage.setItem('translateOnEnter', enabled);
        }

        function handleEnterKey(event) {
            // Check if Translate on Enter is enabled
            const translateOnEnter = document.getElementById('translateOnEnter').checked;
            
            // If Enter is pressed without Shift and Translate on Enter is enabled
            if (event.key === 'Enter' && !event.shiftKey && translateOnEnter) {
                event.preventDefault(); // Prevent default Enter behavior (new line)
                translate();
            }
        }

        function saveAutoTranslate() {
            const enabled = document.getElementById('autoTranslate').checked;
            localStorage.setItem('autoTranslate', enabled);
            setupAutoTranslate(); // Re-setup auto-translate when toggle changes
        }


        function clearHistory() {
            if (confirm('Are you sure you want to clear all translation history?')) {
                history = [];
                localStorage.setItem('translationHistory', JSON.stringify(history));
                loadHistory();
            }
        }

        function toggleHistory() {
            const content = document.getElementById('historyContent');
            const chevron = document.getElementById('historyChevron');
            const isOpen = !content.classList.contains('max-h-0');
            
            if (isOpen) {
                content.classList.remove('max-h-96');
                content.classList.add('max-h-0');
                chevron.style.transform = 'rotate(0deg)';
                localStorage.setItem('historyOpen', 'false');
            } else {
                content.classList.remove('max-h-0');
                content.classList.add('max-h-96');
                chevron.style.transform = 'rotate(180deg)';
                localStorage.setItem('historyOpen', 'true');
            }
        }

        function loadSettings() {
            // Load Auto-Translate
            const savedAutoTranslate = localStorage.getItem('autoTranslate');
            if (savedAutoTranslate) {
                document.getElementById('autoTranslate').checked = savedAutoTranslate === 'true';
            }

            // Load Translate on Enter
            const savedTranslateOnEnter = localStorage.getItem('translateOnEnter');
            if (savedTranslateOnEnter) {
                document.getElementById('translateOnEnter').checked = savedTranslateOnEnter === 'true';
            }

            // Load history state
            const savedHistoryOpen = localStorage.getItem('historyOpen');
            if (savedHistoryOpen === 'true') {
                const content = document.getElementById('historyContent');
                const chevron = document.getElementById('historyChevron');
                content.classList.remove('max-h-0');
                content.classList.add('max-h-96');
                chevron.style.transform = 'rotate(180deg)';
            }
        }


        function updateCharacterCounter() {
            const text = document.getElementById('inputText').value;
            const counter = document.getElementById('charCounter');
            counter.textContent = `${text.length} characters`;
        }

        function swapLanguages() {
            const sourceLang = document.getElementById('sourceLanguage');
            const targetLang = document.getElementById('targetLanguage');
            const inputText = document.getElementById('inputText');

            // Swap languages
            const tempLang = sourceLang.value;
            sourceLang.value = targetLang.value;
            targetLang.value = tempLang;

            // If there's text in input, re-translate it with swapped languages
            if (inputText.value.trim()) {
                translate();
            }
            
            updateCharacterCounter();
        }

        let autoTranslateTimeout;

        async function translate() {
            const inputText = document.getElementById('inputText').value.trim();
            const sourceLang = document.getElementById('sourceLanguage').value;
            const targetLang = document.getElementById('targetLanguage').value;

            if (!inputText) {
                displayTranslation('Please enter text to translate');
                return;
            }

            const btn = document.getElementById('translateBtn');
            btn.textContent = 'Translating...';
            btn.disabled = true;

            try {
                const result = await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=${sourceLang}&tl=${targetLang}&dt=t&q=${encodeURIComponent(inputText)}`);
                const data = await result.json();

                if (data && data[0] && data[0][0] && data[0][0][0]) {
                    const translatedText = data[0][0][0];
                    displayTranslation(translatedText);
                    addToHistory(inputText, translatedText, sourceLang, targetLang);
                    currentTranslation = { input: inputText, output: translatedText, sourceLang, targetLang };
                } else {
                    displayTranslation('Error in translation');
                }
            } catch (error) {
                displayTranslation('Error in translation');
            } finally {
                btn.textContent = 'Translate';
                btn.disabled = false;
            }
        }

        function setupAutoTranslate() {
            const inputText = document.getElementById('inputText');

            // Remove existing listener to avoid duplicates
            inputText.removeEventListener('input', autoTranslateHandler);

            // Add listener if auto-translate is enabled
            if (document.getElementById('autoTranslate').checked) {
                inputText.addEventListener('input', autoTranslateHandler);
            }
        }

        function autoTranslateHandler() {
            clearTimeout(autoTranslateTimeout);
            autoTranslateTimeout = setTimeout(() => {
                const inputText = document.getElementById('inputText');
                if (inputText.value.trim()) {
                    translate();
                }
            }, 500);
        }

        function displayTranslation(text) {
            const outputElement = document.getElementById('outputText');
            outputElement.innerHTML = `<span class="text-gray-900">${escapeHtml(text)}</span>`;
        }

        function copyText(type) {
            let textToCopy = '';
            if (type === 'input') {
                textToCopy = document.getElementById('inputText').value;
            } else if (type === 'output') {
                textToCopy = document.getElementById('outputText').textContent;
            }

            if (textToCopy && textToCopy !== 'Translation will appear here...') {
                navigator.clipboard.writeText(textToCopy).then(() => {
                    showNotification('Copied to clipboard');
                });
            }
        }

        function speakText(type) {
            let textToSpeak = '';
            let lang = '';

            if (type === 'input') {
                textToSpeak = document.getElementById('inputText').value;
                lang = document.getElementById('sourceLanguage').value;
            } else if (type === 'output') {
                textToSpeak = document.getElementById('outputText').textContent;
                lang = document.getElementById('targetLanguage').value;
            }

            if (textToSpeak && textToSpeak !== 'Translation will appear here...' && 'speechSynthesis' in window) {
                const utterance = new SpeechSynthesisUtterance(textToSpeak);
                utterance.lang = lang;
                speechSynthesis.speak(utterance);
            }
        }

        function startVoiceInput() {
            if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                const recognition = new SpeechRecognition();

                recognition.continuous = false;
                recognition.interimResults = false;
                recognition.lang = document.getElementById('sourceLanguage').value;

                recognition.onresult = function(event) {
                    const transcript = event.results[0][0].transcript;
                    document.getElementById('inputText').value = transcript;
                    updateCharacterCounter();
                };

                recognition.onerror = function(event) {
                    console.error('Speech recognition error:', event.error);
                };

                recognition.start();
            } else {
                showNotification('Speech recognition not supported');
            }
        }

        function addToHistory(input, output, fromLang, toLang) {
            const historyItem = {
                id: Date.now(),
                input,
                output,
                fromLang,
                toLang,
                timestamp: new Date().toISOString()
            };

            history.unshift(historyItem);
            // Keep only last 10 items
            if (history.length > 10) {
                history = history.slice(0, 10);
            }
            localStorage.setItem('translationHistory', JSON.stringify(history));
            loadHistory();
        }

        function loadHistory() {
            const historyList = document.getElementById('historyList');
            const historyCounter = document.getElementById('historyCounter');

            historyCounter.textContent = history.length;

            if (history.length === 0) {
                historyList.innerHTML = '<div class="p-4 text-center text-gray-500"><p>No history yet...</p></div>';
                return;
            }

            historyList.innerHTML = history.map(item => `
                <div class="history-item p-4 flex items-start gap-3">
                    <div class="flex-shrink-0 mt-1">
                        <i data-lucide="clock" class="w-4 h-4 text-gray-400"></i>
                    </div>
                    <div class="flex-1 min-w-0">
                        <div class="text-sm text-gray-900 mb-1">${escapeHtml(item.input.substring(0, 100))}${item.input.length > 100 ? '...' : ''}</div>
                        <div class="text-sm text-gray-600">${escapeHtml(item.output.substring(0, 100))}${item.output.length > 100 ? '...' : ''}</div>
                        <div class="text-xs text-gray-400 mt-1">${getLanguageName(item.fromLang)} ${getLanguageName(item.toLang)} · ${formatTime(item.timestamp)}</div>
                    </div>
                    <div class="flex items-center gap-1">
                        <button onclick="toggleFavorite(${item.id})" class="p-1 hover:bg-gray-100 rounded transition-colors">
                            <i data-lucide="star" class="w-4 h-4 text-gray-400"></i>
                        </button>
                        <button onclick="deleteHistoryItem(${item.id})" class="p-1 hover:bg-gray-100 rounded transition-colors">
                            <i data-lucide="trash-2" class="w-4 h-4 text-gray-400"></i>
                        </button>
                    </div>
                </div>
            `).join('');

            lucide.createIcons();
        }

        function getLanguageName(code) {
            const lang = languages.find(l => l.code === code);
            return lang ? lang.name : code;
        }

        function formatTime(timestamp) {
            const date = new Date(timestamp);
            const now = new Date();
            const diff = now - date;

            if (diff < 60000) return 'just now';
            if (diff < 3600000) return `${Math.floor(diff / 60000)} min ago`;
            if (diff < 86400000) return `${Math.floor(diff / 3600000)} hours ago`;
            return `${Math.floor(diff / 86400000)} days ago`;
        }

        function toggleFavorite(id) {
            const item = history.find(h => h.id === id);
            if (item) {
                item.isFavorite = !item.isFavorite;
                localStorage.setItem('translationHistory', JSON.stringify(history));
                loadHistory();
            }
        }

        function deleteHistoryItem(id) {
            history = history.filter(h => h.id !== id);
            localStorage.setItem('translationHistory', JSON.stringify(history));
            loadHistory();
        }

        function showNotification(message) {
            const notification = document.createElement('div');
            notification.className = 'fixed top-4 right-4 bg-gray-800 text-white px-4 py-2 rounded-lg shadow-lg z-50 transition-opacity';
            notification.textContent = message;
            document.body.appendChild(notification);

            setTimeout(() => {
                notification.style.opacity = '0';
                setTimeout(() => notification.remove(), 300);
            }, 2000);
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
