<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Translator Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-white min-h-screen">
    <div class="container mx-auto px-4 py-8 max-w-4xl">
        <!-- Header -->
        <header class="text-center mb-12">
            <h1 class="text-4xl font-bold text-gray-800 mb-2">Translator Pro</h1>
            <p class="text-gray-600">Professional translation tool</p>
        </header>

        <!-- Main Translation Card -->
        <main class="bg-white rounded-2xl shadow-lg border border-gray-200 p-8">
            <!-- Language Selection -->
            <div class="grid grid-cols-2 gap-4 mb-6">
                <div>
                    <label for="sourceLanguage" class="block text-sm font-medium text-gray-700 mb-2">From</label>
                    <select id="sourceLanguage" name="sourceLanguage" 
                            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition">
                        <option value="English" th:selected="${sourceLanguage == 'English'}">English</option>
                        <option value="Spanish" th:selected="${sourceLanguage == 'Spanish'}">Spanish</option>
                        <option value="French" th:selected="${sourceLanguage == 'French'}">French</option>
                        <option value="German" th:selected="${sourceLanguage == 'German'}">German</option>
                        <option value="Italian" th:selected="${sourceLanguage == 'Italian'}">Italian</option>
                        <option value="Portuguese" th:selected="${sourceLanguage == 'Portuguese'}">Portuguese</option>
                        <option value="Russian" th:selected="${sourceLanguage == 'Russian'}">Russian</option>
                        <option value="Chinese" th:selected="${sourceLanguage == 'Chinese'}">Chinese</option>
                        <option value="Japanese" th:selected="${sourceLanguage == 'Japanese'}">Japanese</option>
                    </select>
                </div>
                <div>
                    <label for="targetLanguage" class="block text-sm font-medium text-gray-700 mb-2">To</label>
                    <select id="targetLanguage" name="targetLanguage" 
                            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition">
                        <option value="English" th:selected="${targetLanguage == 'English'}">English</option>
                        <option value="Spanish" th:selected="${targetLanguage == 'Spanish'}">Spanish</option>
                        <option value="French" th:selected="${targetLanguage == 'French'}">French</option>
                        <option value="German" th:selected="${targetLanguage == 'German'}">German</option>
                        <option value="Italian" th:selected="${targetLanguage == 'Italian'}">Italian</option>
                        <option value="Portuguese" th:selected="${targetLanguage == 'Portuguese'}">Portuguese</option>
                        <option value="Russian" th:selected="${targetLanguage == 'Russian'}">Russian</option>
                        <option value="Chinese" th:selected="${targetLanguage == 'Chinese'}">Chinese</option>
                        <option value="Japanese" th:selected="${targetLanguage == 'Japanese'}">Japanese</option>
                    </select>
                </div>
            </div>

            <!-- Translation Form -->
            <form action="/translate" method="post" class="space-y-6">
                <!-- Input Text Area -->
                <div>
                    <label for="text" class="block text-sm font-medium text-gray-700 mb-2">Input Text</label>
                    <textarea id="text" name="text" rows="6" 
                              class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition resize-none"
                              placeholder="Enter text to translate...">[[${originalText}]]</textarea>
                </div>

                <!-- Translate Button -->
                <div class="text-center">
                    <button type="submit" 
                            class="bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-8 rounded-lg transition duration-200 ease-in-out transform hover:scale-105 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2">
                        Translate
                    </button>
                </div>

                <!-- Output Text Area -->
                <div th:if="${translatedText}">
                    <label class="block text-sm font-medium text-gray-700 mb-2">Translation Result</label>
                    <div class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-lg min-h-[150px]">
                        <p class="text-gray-800 whitespace-pre-wrap">[[${translatedText}]]</p>
                    </div>
                </div>
            </form>
        </main>

        <!-- Footer -->
        <footer class="text-center mt-12 text-gray-500 text-sm">
            <p>&copy; 2024 Translator Pro. Built with Spring Boot & Thymeleaf.</p>
        </footer>
    </div>
</body>
</html>
